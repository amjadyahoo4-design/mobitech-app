<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobitech Pro | النظام المتكامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 50px; }
        
        /* Navbar */
        nav { background: rgba(30, 41, 59, 0.9); backdrop-filter: blur(10px); padding: 1rem 2rem; display: flex; justify-content: space-between; border-bottom: 1px solid #334155; position: sticky; top: 0; z-index: 1000; }
        
        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; padding: 2rem; max-width: 1200px; margin: auto; }
        .card { background: var(--card); border: 1px solid #334155; padding: 20px; border-radius: 20px; text-align: center; transition: 0.4s; overflow: hidden; }
        .card:hover { border-color: var(--primary); transform: translateY(-10px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .card img { width: 100%; height: 180px; object-fit: cover; border-radius: 12px; margin-bottom: 15px; }

        /* Inputs */
        .btn { background: var(--primary); color: #000; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn:hover { opacity: 0.9; transform: scale(1.05); }
        input, textarea, select { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #475569; background: #0f172a; color: white; box-sizing: border-box; }

        /* Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); justify-content: center; align-items: center; z-index: 2000; overflow-y: auto; }
        .box { background: var(--card); padding: 2.5rem; border-radius: 25px; width: 90%; max-width: 500px; border: 1px solid var(--primary); }
        .admin-table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #0f172a; }
        .admin-table th, .admin-table td { padding: 15px; border-bottom: 1px solid #334155; text-align: right; }
    </style>
</head>
<body>

<nav>
    <h2 style="margin:0; color: var(--primary);"><i class="fas fa-bolt"></i> Mobitech Pro</h2>
    <div>
        <button class="btn" style="background:transparent; color:white;" onclick="showSection('store')">المتجر</button>
        <button class="btn" onclick="checkAdmin()">لوحة الإدارة</button>
    </div>
</nav>

<div id="storeSection">
    <div style="text-align:center; padding:3rem 1rem;">
        <h1 style="font-size: 2.5rem;">قطع غيار أصلية</h1>
        <input type="text" id="search" placeholder="🔍 ابحث عن القطعة..." style="max-width: 500px;" oninput="filterStore()">
        <div id="missingHint" style="display:none; color: var(--primary); cursor:pointer; margin-top:15px; font-weight:bold;" onclick="requestMissing()">
            💡 لم تجد القطعة؟ اضغط هنا لإرسال طلب توفيرها للمسؤول
        </div>
    </div>
    <div class="grid" id="productGrid"></div>
</div>

<div id="adminSection" style="display:none; padding:2rem;">
    <h2 style="color: var(--primary);">🛠️ لوحة تحكم المسؤول</h2>
    <table class="admin-table">
        <thead><tr><th>الطلب</th><th>الإجراء</th></tr></thead>
        <tbody id="adminDemands"></tbody>
    </table>
</div>

<div class="modal" id="transformModal">
    <div class="box">
        <h3>🚀 نشر منتج جديد</h3>
        <input type="hidden" id="editId">
        <input type="text" id="editTitle" placeholder="اسم المنتج المعدل">
        <input type="number" id="editPrice" placeholder="السعر ($)">
        <textarea id="editDesc" placeholder="تفاصيل المواصفات..." rows="3"></textarea>
        <input type="url" id="editImg" placeholder="رابط صورة المنتج (URL)">
        <div style="display:flex; gap:10px;">
            <button class="btn" onclick="saveProduct()" style="flex:1">نشر في المتجر</button>
            <button class="btn" style="background:#ef4444; flex:1" onclick="document.getElementById('transformModal').style.display='none'">إلغاء</button>
        </div>
    </div>
</div>

<script>
    // البيانات
    let products = JSON.parse(localStorage.getItem('prods')) || [
        {title: "شاشة S24 Ultra", price: "120", desc: "أصلية 100%", img: "https://via.placeholder.com/300"}
    ];
    let demands = JSON.parse(localStorage.getItem('demands')) || [];

    // الوظائف
    function showSection(id) {
        document.getElementById('storeSection').style.display = (id === 'store') ? 'block' : 'none';
        document.getElementById('adminSection').style.display = (id === 'admin') ? 'block' : 'none';
    }

    function renderStore(list = products) {
        document.getElementById('productGrid').innerHTML = list.map(p => `
            <div class="card">
                <img src="${p.img}" onerror="this.src='https://via.placeholder.com/300'">
                <h3>${p.title}</h3>
                <p style="color:var(--primary); font-size:1.4rem; font-weight:bold;">$${p.price}</p>
                <p style="font-size:0.9rem; opacity:0.8;">${p.desc}</p>
            </div>
        `).join('');
    }

    function requestMissing() {
        let title = document.getElementById('search').value;
        demands.push({id: Date.now(), title});
        localStorage.setItem('demands', JSON.stringify(demands));
        alert("✅ تم إرسال طلبك! سيقوم المسؤول بتوفيرها قريباً.");
        document.getElementById('missingHint').style.display = 'none';
    }

    function checkAdmin() {
        if(prompt("أدخل كلمة مرور الإدارة:") === "123") {
            showSection('admin');
            renderAdmin();
        }
    }

    function renderAdmin() {
        document.getElementById('adminDemands').innerHTML = demands.map(d => `
            <tr>
                <td>${d.title}</td>
                <td><button class="btn" onclick="openModal(${d.id})">تحويل لمنتج</button></td>
            </tr>
        `).join('');
    }

    function openModal(id) {
        let d = demands.find(x => x.id === id);
        document.getElementById('editId').value = d.id;
        document.getElementById('editTitle').value = d.title;
        document.getElementById('transformModal').style.display = 'flex';
    }

    function saveProduct() {
        products.push({
            title: document.getElementById('editTitle').value,
            price: document.getElementById('editPrice').value,
            desc: document.getElementById('editDesc').value,
            img: document.getElementById('editImg').value || 'https://via.placeholder.com/300'
        });
        demands = demands.filter(d => d.id != document.getElementById('editId').value);
        localStorage.setItem('prods', JSON.stringify(products));
        localStorage.setItem('demands', JSON.stringify(demands));
        document.getElementById('transformModal').style.display = 'none';
        renderStore();
        renderAdmin();
        alert("🎉 تم نشر المنتج بنجاح!");
    }

    renderStore();
</script>
</body>
</html>
