<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobitech Store</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background-color: #f4f6f9; color: #333; padding: 20px; }
        header { background-color: #007bff; color: white; padding: 20px; text-align: center; border-radius: 8px; margin-bottom: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .product-card { background: white; padding: 15px; margin-bottom: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .product-card h3 { margin: 0 0 10px 0; color: #333; }
        .product-card p { margin: 0 0 10px 0; color: #666; font-size: 0.95rem; }
        .product-meta { display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .price { color: #28a745; }
        .location { color: #007bff; }
    </style>
</head>
<body>

    <header>
        <h1>Mobitech Store</h1>
    </header>

    <div class="container">
        <div class="product-card">
            <h3>آيفون 15 بدو</h3>
            <p>بحالة الزيرو</p>
            <div class="product-meta">
                <span class="price">1000 $</span>
                <span class="location">📍 جبيـل</span>
            </div>
        </div>

        <div class="product-card">
            <h3>لابتوب ديل</h3>
            <p>كور i5 رامات 16</p>
            <div class="product-meta">
                <span class="price">800 $</span>
                <span class="location">📍 جبيـل</span>
            </div>
        </div>
    </div>

</body>
</html>
