<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobitech Hub - المنصة المتكاملة للهواتف والقطع</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --secondary: #0f172a;
            --accent: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --radius: 16px;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: #334155;
            margin: 0;
            padding: 0;
            padding-bottom: 60px;
            overflow-x: hidden;
        }
        
        /* حركة الخلفية الممتدة في الهيدر */
        header {
            background: linear-gradient(135deg, var(--secondary) 0%, #1e293b 100%);
            color: #ffffff;
            text-align: center;
            padding: 40px 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            position: relative;
        }
        header h1 {
            margin: 0;
            font-size: 2.8rem;
            letter-spacing: 1px;
            animation: fadeInDown 0.8s ease;
        }
        header p {
            margin: 8px 0 0 0;
            opacity: 0.8;
            font-size: 1.1rem;
            animation: fadeInUp 0.8s ease 0.2s both;
        }

        /* شريط التحكم */
        .action-bar {
            background-color: #1e293b;
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            border-top: 1px solid #334155;
        }
        .user-status {
            color: #f8fafc;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .auth-buttons button {
            background: rgba(255, 255, 255, 0.08);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .auth-buttons button:hover {
            background-color: var(--primary);
            border-color: var(--primary);
            transform: translateY(-2px);
        }
        .auth-buttons button.admin-btn { background-color: var(--warning); color: #000; border: none; }
        .auth-buttons button.logout-btn { background-color: var(--danger); color: white; border: none; }
        
        /* أزرار التواصل العائمة والتفاعلية */
        .social-connect {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 25px auto;
            max-width: 600px;
            padding: 0 15px;
        }
        .social-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1rem;
            box-shadow: 0 8px 16px rgba(0,0,0,0.05);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .social-btn:hover { 
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 20px rgba(0,0,0,0.15);
        }
        .whatsapp { background: linear-gradient(135deg, #25d366, #128c7e); }
        .telegram { background: linear-gradient(135deg, #0088cc, #0077b5); }

        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 15px;
        }

        /* أزرار الفلترة التفاعلية مع تأثير خط سفلي متحرك */
        .category-scroll {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 10px 5px;
            scrollbar-width: none;
            margin-bottom: 30px;
        }
        .category-scroll::-webkit-scrollbar { display: none; }
        .cat-chip {
            background-color: #e2e8f0;
            color: #334155;
            padding: 10px 22px;
            border-radius: 30px;
            white-space: nowrap;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        .cat-chip:hover {
            background-color: #cbd5e1;
            transform: scale(1.03);
        }
        .cat-chip.active {
            background-color: var(--primary);
            color: white;
            box-shadow: 0 8px 16px rgba(37,99,235,0.25);
            transform: scale(1.05);
        }

        /* اللوحات والنماذج التفاعلية */
        .panel {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.02);
            margin-bottom: 35px;
            border: 1px solid #e2e8f0;
            animation: slideInUp 0.5s ease;
        }
        .hidden { display: none !important; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 0.95rem; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            box-sizing: border-box;
            transition: all 0.3s ease;
            background-color: #f8fafc;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(37,99,235,0.1);
        }

        /* شبكة وبطاقات العرض الرائجة المتفاعلة */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
            gap: 30px;
        }
        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            opacity: 0;
            animation: scaleIn 0.4s ease forwards;
        }
        
        /* حركة حية عند تحريك الماوس أو لمس المنتج */
        .card:hover { 
            transform: translateY(-8px);
            box-shadow: 0 20px 30px rgba(15,23,42,0.08);
            border-color: rgba(37,99,235,0.2);
        }
        .card-img-container {
            width: 100%;
            height: 220px;
            overflow: hidden;
            position: relative;
            background-color: #e2e8f0;
        }
        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }
        .card:hover .card-img {
            transform: scale(1.08);
        }
        
        .card-content {
            padding: 22px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        .card h3 { margin: 0 0 10px 0; color: var(--secondary); font-size: 1.3rem; transition: color 0.3s; }
        .card:hover h3 { color: var(--primary); }
        .card p { margin: 0 0 20px 0; color: #64748b; font-size: 0.95rem; line-height: 1.5; }
        
        .card-meta {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .price { font-size: 1.4rem; color: var(--primary); font-weight: 800; }
        
        /* أزرار تفاعلية نابضة */
        .submit-btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            font-size: 1rem;
            box-shadow: 0 4px 12px rgba(37,99,235,0.2);
            transition: all 0.3s ease;
        }
        .submit-btn:hover {
            box-shadow: 0 6px 18px rgba(37,99,235,0.35);
            opacity: 0.95;
        }
        .buy-btn {
            text-align: center;
            text-decoration: none;
            padding: 8px 18px;
            font-size: 0.9rem;
            width: auto;
        }

        /* هيكل تحميل المربعات الذكية (Skeleton Loading) */
        .skeleton-card {
            background: #fff;
            border-radius: var(--radius);
            height: 380px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
        }
        .skeleton-img { width: 100%; height: 220px; background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
        .skeleton-text { height: 20px; margin: 15px; background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%); background-size: 200% 100%; animation: loading 1.5s infinite; border-radius: 4px; }
        .skeleton-text.short { width: 60%; }

        /* نظام الإشعارات المنبثقة التفاعلية الحديثة */
        #toast-container {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .toast {
            background: #0f172a;
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            animation: slideInLeft 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.25) forwards;
            border-right: 5px solid var(--primary);
        }
        .toast.success { border-right-color: var(--accent); }
        .toast.danger { border-right-color: var(--danger); }

        /* الأنيميشن والحركات التفاعلية */
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        @keyframes fadeInDown { from { opacity:0; transform: translateY(-20px); } to { opacity:1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }
