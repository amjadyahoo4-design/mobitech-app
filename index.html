<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>متجر Mobitech</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDyXyMSyLAIgyMUIjP6Is9zgxG3sJv0F5A",
            authDomain: "mobitech-28b01.firebaseapp.com",
            projectId: "mobitech-28b01",
            storageBucket: "mobitech-28b01.firebasestorage.app",
            messagingSenderId: "915272441391",
            appId: "1:915272441391:web:8d9f2c8e897385226a30da"
        };
        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.productsCol = collection(window.db, "mobitech");
        window.requestsCol = collection(window.db, "merchant_requests");
    </script>
    <style>
        body { background: #0b0f19; color: #fff; font-family: sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .product-card { background: #151c2c; padding: 15px; border-radius: 10px; border: 1px solid #38bdf8; }
        .section { background: #1e293b; padding: 20px; border-radius: 10px; margin-top: 30px; }
        button { background: #38bdf8; padding: 8px 15px; border-radius: 5px; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <h1 style="text-align:center;">متجر Mobitech</h1>
    
    <div id="productGrid" class="grid"></div>

    <hr>

    <div class="section">
        <h3>هل أنت تاجر؟</h3>
        <button onclick="document.getElementById('adminArea').style.display='block'">إظهار خيارات التاجر</button>
        
        <div id="adminArea" style="display:none; margin-top:15px;">
            <input type="password" id="adminPass" placeholder="كلمة المرور">
            <button onclick="adminLogin()">دخول لوحة التحكم</button>
            <div id="adminControls" style="display:none; margin-top:10px;">
                <input id="pTitle" placeholder="اسم القطعة">
                <input id="pPrice" placeholder="السعر">
                <button onclick="addProduct()">نشر المنتج</button>
            </div>
        </div>
    </div>

    <script>
        // عرض المنتجات للجميع فوراً
        onSnapshot(window.productsCol, (snap) => {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                grid.innerHTML += `<div class="product-card">
                    <h4>${p.title}</h4>
                    <p>السعر: ${p.price}$</p>
                </div>`;
            });
        });

        function adminLogin() {
            if(document.getElementById('adminPass').value === "1234") {
                document.getElementById('adminControls').style.display = "block";
            } else { alert("كلمة السر خطأ"); }
        }

        async function addProduct() {
            await addDoc(window.productsCol, { 
                title: document.getElementById('pTitle').value, 
                price: document.getElementById('pPrice').value 
            });
            alert("تم إضافة المنتج!");
        }
    </script>
</body>
</html>
