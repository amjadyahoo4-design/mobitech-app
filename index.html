<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Mobitech | متجر خدمات الهواتف</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDyXyMSyLAIgyMUIjP6Is9zgxG3sJv0F5A",
            authDomain: "mobitech-28b01.firebaseapp.com",
            projectId: "mobitech-28b01",
            storageBucket: "mobitech-28b01.firebasestorage.app",
            messagingSenderId: "915272441391",
            appId: "1:915272441391:web:8d9f2c8e897385226a30da"
        };
        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.auth = getAuth(app);
        window.productsCol = collection(window.db, "mobitech");
        window.requestsCol = collection(window.db, "merchant_requests");
    </script>
    <style>
        body { background: #0b0f19; color: #fff; font-family: sans-serif; padding: 20px; }
        .product-card { background: #151c2c; padding: 15px; border-radius: 10px; margin: 10px; display: inline-block; width: 200px; }
        .panel { background: #1e293b; padding: 20px; border-radius: 10px; margin-top: 20px; }
        button { background: #38bdf8; border: none; padding: 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <h1 style="text-align:center;">مرحباً بكم في Mobitech</h1>
    
    <div id="productGrid"></div>

    <div class="panel">
        <h3>هل أنت تاجر؟ اطلب صلاحية الإضافة</h3>
        <input type="text" id="merchantEmail" placeholder="بريدك الإلكتروني">
        <button onclick="requestMerchant()">إرسال طلب للمسؤول</button>
    </div>

    <div class="panel">
        <h3>لوحة إدارة المسؤول</h3>
        <input type="password" id="adminPass" placeholder="كلمة المرور">
        <button onclick="adminLogin()">دخول المسؤول</button>
        <div id="adminControls" style="display:none;">
            <input id="pTitle" placeholder="اسم المنتج">
            <input id="pPrice" placeholder="السعر">
            <button onclick="addProduct()">نشر المنتج</button>
        </div>
    </div>

    <script>
        // عرض المنتجات تلقائياً للجميع
        onSnapshot(window.productsCol, (snap) => {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                grid.innerHTML += `<div class="product-card">
                    <h4>${p.title}</h4>
                    <p>${p.price}$</p>
                </div>`;
            });
        });

        // طلب صلاحية تاجر
        async function requestMerchant() {
            const email = document.getElementById('merchantEmail').value;
            await addDoc(window.requestsCol, { email: email, status: "pending" });
            alert("تم إرسال طلبك! سيتواصل معك المسؤول قريباً.");
        }

        // دخول المسؤول
        function adminLogin() {
            if(document.getElementById('adminPass').value === "1234") {
                document.getElementById('adminControls').style.display = "block";
            } else { alert("كلمة السر خطأ"); }
        }

        // إضافة منتج (متاحة للمسؤول فقط)
        async function addProduct() {
            await addDoc(window.productsCol, { 
                title: document.getElementById('pTitle').value, 
                price: document.getElementById('pPrice').value 
            });
            alert("تم إضافة المنتج للمتجر بنجاح!");
        }
    </script>
</body>
</html>
