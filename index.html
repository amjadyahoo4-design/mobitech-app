<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobitech | المنصة الذكية</title>
    <link rel="stylesheet" href="style.css"> </head>
<body>

    <nav class="navbar">
        <div class="logo">Mobitech 📱</div>
        <div class="menu">
            <a href="#">المتجر</a>
            <a href="#">خدمة FRP</a>
            <a href="#">إضافة سلعة</a>
        </div>
    </nav>

    <header class="hero">
        <h1>منصة Mobitech الذكية</h1>
        <p>المكتب والمنصة المتكاملة لصيانة الهواتف والأجهزة الذكية.</p>

            <button class="btn-admin">لوحة المسؤول</button>
            <button class="btn-login">دخول زبون</button>
        </div>
    </header>

    <section class="store-section">
        <h3>📦 تصفح معروضات المتجر المتوفرة حياً</h3>
        <input type="text" placeholder="ابحث عن منتج..." class="search-bar">
        <div id="productsGrid" class="grid-container">
            </div>
    </section>

    <div class="cart-bar">
        <span>0 منتج في السلة</span>
        <button class="btn-order">إرسال الطلب واتساب</button>
    </div>

</body>
</html>
